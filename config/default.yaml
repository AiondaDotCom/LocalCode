backend: "mlx"

mlx:
  host: "127.0.0.1"
  port: 8000
  default_model: "nightmedia/Qwen3.5-35B-A3B-Text-qx64-hi-mlx"
  current_model: null
  timeout: 300
  context_window: 32768
  max_tokens: 8192

ollama:
  host: "localhost"
  port: 11434
  default_model: "codellama:latest"
  current_model: null
  timeout: 120

ui:
  colors: true
  streaming: true
  history_size: 100
  prompt_prefix: "localcode> "

permissions:
  safe_auto_allow:
    - file_read
    - grep_search
    - websearch
    - webopen
    - webfind
  dangerous_confirm:
    - file_write
    - shell_exec
    - file_delete
  blocked: []

testing:
  auto_approve: false
  auto_deny: false
  simulate_only: false
  mock_execution: false
